name: Release

# Publishes the GitHub Release HACS distributes from. Triggered by any version
# tag push (whether created by release-please (#132) or pushed manually).
# Gates on CI (#128) having passed for the tagged commit — main has no
# required-status-check branch protection, so this is the enforcement point —
# then validates manifest.json's version matches the tag before publishing.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          required_jobs="lint test hassfest hacs"
          conclusions=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs" \
            --jq '.check_runs[] | select(.name=="lint" or .name=="test" or .name=="hassfest" or .name=="hacs") | "\(.name)=\(.conclusion)"')

          for job in $required_jobs; do
            line=$(echo "$conclusions" | grep "^${job}=" || true)
            if [ -z "$line" ]; then
              echo "CI job '$job' has not run for ${{ github.sha }}" >&2
              exit 1
            fi
            if [ "${line#*=}" != "success" ]; then
              echo "CI job '$job' did not succeed for ${{ github.sha }}: $line" >&2
              exit 1
            fi
          done
          echo "All CI jobs succeeded for ${{ github.sha }}."

      - name: Validate manifest.json version matches tag
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          manifest_version=$(python3 -c "import json; print(json.load(open('custom_components/smart_charging/manifest.json'))['version'])")
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match manifest.json version ${manifest_version}" >&2
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} matches manifest.json version ${manifest_version}."

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
