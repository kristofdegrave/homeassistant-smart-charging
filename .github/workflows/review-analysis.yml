name: Review analysis docs

# Label-driven fresh Opus review. Runs ONLY when the `ai-review` label is added to a PR —
# either by the maintainer directly, or via WORKFLOW_PAT by the generate-uc / fix-review
# workflows (labels added with the default GITHUB_TOKEN would NOT trigger this workflow).
# Adding the label requires Triage+ permission, and the actor allow-list below is checked
# on top of that, so the label itself is the maintainer's approval to spend the API key —
# the `ai` environment no longer needs a required-reviewer rule.
#
# After the review the workflow removes `ai-review` and routes by the verdict marker Claude
# embeds in its comment:
#   clean                     → stop; ready for the maintainer's manual review
#   remarks (cycles 1–3)      → add `ai-fix` (via PAT) so fix-review.yml addresses them
#   remarks (4th time)        → add `needs-human` and stop (max 3 automatic fix cycles)
#
# A maintainer's manual approval is still required before merge (CODEOWNERS + branch
# protection); this loop only drafts and polishes.
#
# Uses `pull_request` (NOT pull_request_target): fork PRs run WITHOUT secrets, so an
# external PR cannot spend the API key.

on:
  pull_request:
    types: [labeled]
    paths:
      - "docs/analysis/**"

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: review-analysis-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Guard 1 (label) + Guard 2 (actor allow-list). PAT-added labels count as the PAT owner.
    if: >
      github.event.label.name == 'ai-review' &&
      contains(fromJSON('["kristofdegrave"]'), github.event.sender.login)
    runs-on: ubuntu-latest
    environment: ai

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the reviewer can diff against the base branch

      - name: Fresh-agent review
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # so `gh pr comment` works in the runner
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Use the default workflow token for GitHub ops (no Claude GitHub App / OIDC needed).
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review the analysis-document changes in pull request #${{ github.event.pull_request.number }}.
            Run `git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} -- docs/analysis`
            to see the changed files, then read the ones that changed plus, as needed,
            system-overview.md (glossary + `sc_` naming), requirements.md (requirement IDs),
            control-cycle.md, resolution-rules.md, and entity-catalog.md.

            Check, in one pass:
            1. Cross-document consistency — every domain term is defined in the system-overview.md
               glossary (flag any that isn't); every requirement ID exists and is used correctly;
               entity ids match entity-catalog.md; relationships to other docs are accurate.
            2. Requirement coverage — the doc satisfies the requirement(s) it claims; nothing
               contradicts another analysis doc; no requirement is mis-homed.
            3. Quality — "what, not how" (no code/HA implementation detail); it references, and does
               not restate, control-cycle.md / resolution-rules.md; for a use-case: testable
               pre/postconditions, Given/When/Then, alternate flows numbered to the step they branch
               from, and entity-catalog Read by / Written by updated for entities it touches; for a
               mode use-case (UC01–UC04): a stateDiagram-v2 whose states/transitions match the
               scenarios; domain events are past-tense PascalCase.

            Post exactly ONE PR comment via
            `gh pr comment ${{ github.event.pull_request.number }} --body "<markdown>"`,
            with findings grouped by severity (Critical / Major / Minor / Nit), each with a file/line
            reference, ending with a ready-to-merge recommendation. Do not edit any files.

            The VERY LAST line of the comment must be exactly one of these two machine-readable
            markers (the workflow routes on it):
            - `<!-- ai-review-verdict: remarks -->` if there is at least one Critical or Major
              finding that must be addressed before merge
            - `<!-- ai-review-verdict: clean -->` otherwise (Minor/Nit findings alone are clean)
          # NOTE: claude_args is tokenized shell-style, so the --allowed-tools value MUST be
          # quoted — unquoted spaces inside Bash(...) patterns split the list into garbage
          # tokens and every Bash call gets denied.
          claude_args: >-
            --model opus --max-turns 16
            --allowed-tools "Read,Glob,Grep,Bash(gh pr comment:*),Bash(git diff:*)"

      - name: Route by verdict (max 3 automatic fix cycles)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          comments=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" --paginate)

          # Latest verdict marker posted by the review above.
          verdict=$(echo "$comments" \
            | jq -r '[.[] | select(.body | contains("<!-- ai-review-verdict:"))] | last.body // ""' \
            | grep -oE 'ai-review-verdict: (remarks|clean)' | awk '{print $2}' || true)

          # Cycle counter: every past "remarks" verdict on this PR is one review→fix cycle.
          remarks_count=$(echo "$comments" \
            | jq '[.[] | select(.body | contains("<!-- ai-review-verdict: remarks -->"))] | length')

          echo "verdict=${verdict:-none}, remarks verdicts so far (incl. this one)=${remarks_count}"

          # Removal never needs to trigger anything, so the default token is fine here.
          gh pr edit "$PR" --remove-label ai-review || true

          if [ "${verdict:-}" = "remarks" ]; then
            if [ "$remarks_count" -le 3 ]; then
              # PAT so the labeled event actually triggers fix-review.yml.
              GH_TOKEN="$WORKFLOW_PAT" gh pr edit "$PR" --add-label ai-fix
            else
              gh pr edit "$PR" --add-label needs-human
              gh pr comment "$PR" --body "Automatic review/fix limit reached (3 cycles) — remaining remarks need a human. Label \`ai-fix\` manually to force one more cycle."
            fi
          fi
