name: CI

# Build/validate + test gate for the integration code. Scoped by path so it stays idle on
# docs-only and tooling-only PRs and activates once integration code exists (the first code PR
# adds custom_components/, manifest.json, pyproject.toml, requirements-test.txt). Realizes the
# dev-tooling CI that ADR-0009 deferred (pytest for logic, HA harness for adapters/coordinator).

on:
  push:
    branches: [main]
    paths:
      - "custom_components/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements-test.txt"
      - "hacs.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "custom_components/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements-test.txt"
      - "hacs.json"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-test.txt
      # Exit 5 = "no tests collected"; tolerated during scaffolding before the
      # first tests land (Phase 1). Any real failure (exit 1) still fails the job.
      - run: pytest -q || [ $? -eq 5 ]

  hassfest:
    # Validates manifest.json / integration structure against Home Assistant's own checks.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Pinned SHA of master — Dependabot keeps it fresh; hassfest has no version tags.
      - uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master

  hacs:
    # Validates the repo is installable as a HACS custom integration.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Pinned SHA of main — Dependabot keeps it fresh; hacs/action has no version tags.
      - uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main
        with:
          category: integration
          # brands requires the integration to be listed in home-assistant/brands,
          # which only happens at publish time. Ignore it during pre-publish dev.
          ignore: brands
