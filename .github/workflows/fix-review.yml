name: Fix review remarks

# Triggered only when the `ai-fix` label is added to a PR — by review-analysis.yml (via
# WORKFLOW_PAT, after a "remarks" verdict, max 3 automatic cycles) or by the maintainer
# manually. Claude addresses the latest review comment's findings, the workflow pushes the
# fixes to the PR branch, then hands back to review by re-adding `ai-review` (via PAT, so
# the labeled event actually triggers review-analysis.yml).
#
# Guards mirror generate-uc.yml: exact label + actor allow-list (PAT-added labels count as
# the PAT owner) + same-repo head branch only (never check out fork code with write perms).
# Merge still requires the maintainer's manual approval (CODEOWNERS + branch protection).

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: fix-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  fix:
    if: >
      github.event.label.name == 'ai-fix' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJSON('["kristofdegrave"]'), github.event.sender.login)
    runs-on: ubuntu-latest
    # Environment scopes the ANTHROPIC_API_KEY secret (no required-reviewer rule anymore).
    environment: ai

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Address review remarks with Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # so `gh pr view` works in the runner
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The action auto-loads CLAUDE.md, .claude/skills/, and .claude/agents/.
          prompt: |
            The fresh-agent review of pull request #${{ github.event.pull_request.number }} found
            remarks that must be addressed. This branch is already checked out at the PR head.

            1. Run `gh pr view ${{ github.event.pull_request.number }} --comments` and find the
               MOST RECENT comment containing `ai-review-verdict: remarks` — that is the review
               to address. Ignore older review comments except as context.
            2. Fix every Critical and Major finding in the files under docs/analysis/, following
               CLAUDE.md and the `write-use-case` skill. Also fix Minor/Nit findings when the
               change is trivial and local.
            3. Keep cross-document consistency: if a fix introduces a domain term, add it to the
               system-overview.md glossary; keep entity-catalog.md Read by / Written by columns
               accurate; reference — do not restate — control-cycle.md and resolution-rules.md.
            4. If you disagree with a finding, leave the document unchanged for that finding —
               you will explain why in the summary comment below.
            5. When done, post exactly ONE PR comment via
               `gh pr comment ${{ github.event.pull_request.number }} --body "<markdown>"`
               summarizing what you did: start the body with `<!-- ai-fix-summary -->`, then for
               each finding of the review say whether it was **Fixed** (what changed, with file
               references), **Skipped** (and why you disagree), or **Partially fixed**. Keep it
               short — one bullet or table row per finding.
               CRITICAL: the comment must NOT contain the text "ai-review-verdict" anywhere (not
               even quoted) — the workflows route and count fix cycles by searching comment
               bodies for that marker, and a summary containing it would be miscounted as a
               review and break the cycle limit.
            6. Do NOT commit or push — the workflow does that in the next step.
          # NOTE: claude_args is tokenized shell-style, so the --allowed-tools value MUST be
          # quoted — unquoted spaces inside Bash(...) patterns split the list into garbage
          # tokens and every Bash call gets denied.
          # 50 turns: every tool call is a turn, and a fix pass reads the review + several
          # analysis docs, edits multiple files, and posts a summary — 20 was hit mid-work.
          # Read-only git commands included so inspecting its own edits doesn't burn turns
          # on permission denials.
          claude_args: >-
            --model opus --max-turns 50
            --allowed-tools "Read,Write,Edit,Glob,Grep,Bash(gh pr view:*),Bash(gh pr comment:*),Bash(git diff:*),Bash(git log:*),Bash(git status:*)"

      # The action's job step exits 0 even when the underlying Claude call errored (e.g. bad
      # API key, no credits, rate limit) — is_error only shows up inside execution_file. Without
      # this gate, "Hand back to AI review" re-adds ai-review unconditionally, which turns any
      # persistent API failure into an infinite fix<->review loop with no fix ever applied.
      - name: Check the fix actually ran
        id: check
        run: |
          set -euo pipefail
          file="${{ steps.claude.outputs.execution_file }}"
          is_error=$( [ -n "$file" ] && [ -f "$file" ] && jq -r 'map(select(.type == "result")) | last | .is_error // true' "$file" || echo true)
          if [ "$is_error" = "true" ]; then
            echo "success=false" >> "$GITHUB_OUTPUT"
          else
            echo "success=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push fixes
        if: steps.check.outputs.success == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to commit (review remarks produced no edits)."
          else
            git commit -m "docs: address AI review remarks (#${{ github.event.pull_request.number }})"
            git push
          fi

      - name: Hand back to AI review
        if: steps.check.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr edit "$PR" --remove-label ai-fix || true
          # PAT so the labeled event actually triggers review-analysis.yml for the next cycle.
          GH_TOKEN="$WORKFLOW_PAT" gh pr edit "$PR" --add-label ai-review

      # A failed fix run must not leave the PR stuck with a stale `ai-fix` label and no signal.
      - name: Clean up on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh pr edit "$PR" --remove-label ai-fix || true
          gh pr comment "$PR" --body "The automatic fix run **failed** (see the Actions log for this run). Re-add the \`ai-fix\` label to retry, or address the review manually."

      # Distinct from "Clean up on failure": the job step above does NOT fail when the Claude
      # API call itself errors (bad key, no credits, rate limit) — it exits 0 regardless. This
      # catches that case so it doesn't silently re-trigger ai-review and loop forever.
      - name: Clean up on API error
        if: always() && steps.check.outputs.success == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh pr edit "$PR" --remove-label ai-fix || true
          gh pr comment "$PR" --body "The automatic fix's Claude call **errored** before making any changes (see the \`Address review remarks with Claude Code\` step's execution log for this run — often an API key/credits/rate-limit issue). No labels were changed automatically to avoid a fix/review loop. Fix the underlying issue, then re-add \`ai-fix\` to retry."
