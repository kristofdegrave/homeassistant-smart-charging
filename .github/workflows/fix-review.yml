name: Fix review remarks

# Triggered only when the `ai-fix` label is added to a PR — by review-analysis.yml (via
# WORKFLOW_PAT, after a "remarks" verdict, max 3 automatic cycles) or by the maintainer
# manually. Claude addresses the latest review comment's findings, the workflow pushes the
# fixes to the PR branch, then hands back to review by re-adding `ai-review` (via PAT, so
# the labeled event actually triggers review-analysis.yml).
#
# Guards mirror generate-uc.yml: exact label + actor allow-list (PAT-added labels count as
# the PAT owner) + same-repo head branch only (never check out fork code with write perms).
# Merge still requires the maintainer's manual approval (CODEOWNERS + branch protection).

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: fix-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  fix:
    if: >
      github.event.label.name == 'ai-fix' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJSON('["kristofdegrave"]'), github.event.sender.login)
    runs-on: ubuntu-latest
    # Environment scopes the ANTHROPIC_API_KEY secret (no required-reviewer rule anymore).
    environment: ai

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Address review remarks with Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # so `gh pr view` works in the runner
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The action auto-loads CLAUDE.md, .claude/skills/, and .claude/agents/.
          prompt: |
            The fresh-agent review of pull request #${{ github.event.pull_request.number }} found
            remarks that must be addressed. This branch is already checked out at the PR head.

            Follow the `address-review-remarks` skill in .claude/skills/ — it defines how to
            locate the review, the fix policy, cross-document consistency rules, and the exact
            summary-comment contract (including the marker rules). CI specifics:
            - The PR number is ${{ github.event.pull_request.number }}.
            - You are running in CI: do NOT commit or push — the workflow does that in the
              next step.
          # NOTE: claude_args is tokenized shell-style, so the --allowed-tools value MUST be
          # quoted — unquoted spaces inside Bash(...) patterns split the list into garbage
          # tokens and every Bash call gets denied.
          # 50 turns: every tool call is a turn, and a fix pass reads the review + several
          # analysis docs, edits multiple files, and posts a summary — 20 was hit mid-work.
          # Read-only git commands included so inspecting its own edits doesn't burn turns
          # on permission denials.
          claude_args: >-
            --model opus --max-turns 50
            --allowed-tools "Read,Write,Edit,Glob,Grep,Bash(gh pr view:*),Bash(gh pr comment:*),Bash(git diff:*),Bash(git log:*),Bash(git status:*)"

      - name: Commit and push fixes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to commit (review remarks produced no edits)."
          else
            git commit -m "docs: address AI review remarks (#${{ github.event.pull_request.number }})"
            git push
          fi

      - name: Hand back to AI review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr edit "$PR" --remove-label ai-fix || true
          # PAT so the labeled event actually triggers review-analysis.yml for the next cycle.
          GH_TOKEN="$WORKFLOW_PAT" gh pr edit "$PR" --add-label ai-review

      # A failed fix run must not leave the PR stuck with a stale `ai-fix` label and no signal.
      - name: Clean up on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh pr edit "$PR" --remove-label ai-fix || true
          gh pr comment "$PR" --body "The automatic fix run **failed** (see the Actions log for this run). Re-add the \`ai-fix\` label to retry, or address the review manually."
