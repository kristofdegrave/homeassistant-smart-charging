name: release-please

# Opens/updates a release PR from conventional commits on main (version bump in
# manifest.json + CHANGELOG.md). On merge, tags the release but does not publish
# a GitHub Release itself (skip-github-release in release-please-config.json) —
# the tag push triggers release.yml (#131), which validates and publishes.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
